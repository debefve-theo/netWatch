services:
  postgres:
    image: postgres:16-alpine
    container_name: netwatch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${APP_IMAGE:-netwatch-app:local}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netwatch-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: ${PORT:-3000}
      HOSTNAME: ${HOSTNAME:-0.0.0.0}
      DATABASE_URL: ${DATABASE_URL}
      API_KEY_PEPPER: ${API_KEY_PEPPER}
      APP_URL: ${APP_URL}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-NetWatch}
      DEVICE_OFFLINE_THRESHOLD_MINUTES: ${DEVICE_OFFLINE_THRESHOLD_MINUTES:-10}
      RUN_DB_MIGRATIONS: ${RUN_DB_MIGRATIONS:-true}
      SEED_DEVICE_NAME: ${SEED_DEVICE_NAME:-Demo Raspberry Pi}
      SEED_DEVICE_LOCATION: ${SEED_DEVICE_LOCATION:-Maison}
    ports:
      - "${APP_PORT:-8080}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
